#cloud-config
package_upgrade: true
runcmd:
  - curl -fsSL https://get.docker.com -o get-docker.sh
  - sh get-docker.sh
  - systemctl enable --now docker
  - usermod -aG docker azureuser
  - mkdir -p /home/azureuser/app
  - git clone https://github.com/SofiaPasichko/open-data-ai-analytics.git /home/azureuser/app
  - chown -R azureuser:azureuser /home/azureuser/app
  - cd /home/azureuser/app
  - |
    cat <<EOF > .env
    POSTGRES_USER=user
    POSTGRES_PASSWORD=password
    POSTGRES_DB=mydb
    POSTGRES_HOST=db
    POSTGRES_PORT=5432
    EOF
  - docker compose up -d db
  - sleep 20
  - docker compose up data_load
  - docker compose up -d web data_quality_analysis
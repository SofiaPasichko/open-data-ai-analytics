name: CI self-hosted

on:
  workflow_dispatch:
    inputs:
      module:
        description: "Choose module to run on self-hosted runner"
        required: true
        default: "data_visualization"
        type: choice
        options:
          - data_load
          - data_quality
          - data_research
          - data_visualization

jobs:
  run-selfhosted:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib seaborn scikit-learn

      - name: Run selected module
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts/${{ github.event.inputs.module }}"
          python src/${{ github.event.inputs.module }}.py *> artifacts/${{ github.event.inputs.module }}/output-selfhosted.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selfhosted-${{ github.event.inputs.module }}
          path: artifacts/${{ github.event.inputs.module }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-data-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/SofiaPasichko/open-data-ai-analytics.git'
    targetRevision: HEAD
    path: gitops/app
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: open-data-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true